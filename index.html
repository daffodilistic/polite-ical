<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polite ICS Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>Polite ICS Converter</h1>
        <p>
          Load an XLSX workbook and export a calendar-ready <code>.ics</code>
          file.
        </p>
      </header>

      <section class="card">
        <label class="file-input-label">
          Select XLSX file
          <input id="fileInput" type="file" accept=".xlsx, .xls" />
        </label>

        <div id="sheetControls" class="hidden">
          <label>Sheet:
            <select id="sheetSelect"></select>
          </label>
        </div>

        <div id="mappingControls" class="hidden card">
          <h2>Column Mapping</h2>
          <div class="grid">
            <div>
              <label for="summarySelect">Summary (Event Title)</label>
              <select id="summarySelect"></select>
            </div>
            <div>
              <label for="startDateSelect">Start Date</label>
              <select id="startDateSelect"></select>
            </div>
            <div>
              <label for="startTimeSelect">Start Time</label>
              <select id="startTimeSelect"></select>
            </div>
            <div>
              <label for="endDateSelect">End Date</label>
              <select id="endDateSelect"></select>
            </div>
            <div>
              <label for="endTimeSelect">End Time</label>
              <select id="endTimeSelect"></select>
            </div>
            <div>
              <label for="locationSelect">Location</label>
              <select id="locationSelect"></select>
            </div>
            <div class="full-width">
              <label for="descriptionSelect">Description</label>
              <select id="descriptionSelect"></select>
            </div>
          </div>
        </div>

        <div class="actions hidden" id="actions">
          <button id="convertButton" type="button">Convert to ICS</button>
        </div>

        <div id="downloadArea" class="hidden card">
          <p id="resultMessage"></p>
          <a id="downloadLink" class="button secondary" download="events.ics"
          >Download ICS file</a>
        </div>

        <div id="previewArea" class="hidden card">
          <h2>Preview</h2>
          <pre id="previewText"></pre>
        </div>

        <div id="logArea" class="card log hidden">
          <h2>Notes</h2>
          <div id="logOutput"></div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
